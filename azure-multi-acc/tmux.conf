# ── Terminal ──────────────────────────────────────────────────────────────────
set -g default-terminal "screen-256color"
set -ag terminal-overrides ",xterm-256color:RGB"   # true color (was commented out — enable it)

# ── Prefix: C-a ───────────────────────────────────────────────────────────────
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# ── General ───────────────────────────────────────────────────────────────────
set -sg escape-time 0          # was commented out — 0 is correct for Neovim (not 10)
set -g history-limit 50000
set -g display-time 3000
set -g status-interval 3       # refresh status bar (shows kubectl ctx, etc.)
set -g focus-events on         # needed for vim/nvim autoread
set -g mouse on

# ── Windows & panes: 1-indexed ────────────────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on     # close window 2 → window 3 becomes 2, no gaps

# ── Key bindings ──────────────────────────────────────────────────────────────
unbind r
bind r source-file ~/.tmux.conf \; display-message "✓ tmux.conf reloaded"

# Splits — preserve current path (your original didn't)
unbind %
unbind '"'
bind '\' split-window -h -c "#{pane_current_path}"
bind '-'  split-window -v -c "#{pane_current_path}"

# New window also preserves path
bind c new-window -c "#{pane_current_path}"

# Resize (your originals, kept as-is)
bind -r j resize-pane -D 6
bind -r k resize-pane -U 6
bind -r l resize-pane -R 6
bind -r h resize-pane -L 6
bind -r m resize-pane -Z       # zoom/unzoom

# ── Vi copy mode ──────────────────────────────────────────────────────────────
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle  # block select
unbind -T copy-mode-vi MouseDragEnd1Pane

# ── Status bar ────────────────────────────────────────────────────────────────
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Left: session name
set -g status-left-length 30
set -g status-left "#[bg=#313244,fg=#cdd6f4,bold] #S #[bg=#1e1e2e,fg=#313244]  "

# Right: kubectl context + az cloud + time
# - AZ_ACTIVE_CLOUD is set by ~/your-company-env/az-env.sh (global/cn)
# - kubectl current-context truncated to 28 chars so it doesn't overflow
set -g status-right-length 120
# Cloud indicator: reads ~/.az-active-cloud written by az-global/az-cn in az-env.sh
# Context: remap full cluster names to short region:env labels
#   usyour-companyv3-aks-prod01     → us:prod
#   seayour-companyv3-aks-staging01 → sea:stag
#   fryour-companyv3-aks-prod01     → eu:prod
#   ccnyour-companyv3-aks-dev01     → cn:dev
set -g status-right "#[fg=#585b70]#(cloud=\$(cat ~/.az-active-cloud 2>/dev/null); [ \"$cloud\" = cn ] && echo \"#[fg=#fab387]☁ CN\" || echo \"#[fg=#89b4fa]☁ GL\") #[fg=#585b70]│ #[fg=#a6e3a1]#(kubectl config current-context 2>/dev/null | sed 's/usyour-companyv3-aks/us/;s/seayour-companyv3-aks/sea/;s/fryour-companyv3-aks/eu/;s/ccnyour-companyv3-aks/cn/' | sed 's/-0[0-9]//') #[fg=#585b70]│ #[fg=#cdd6f4]%H:%M"

# Window tabs
setw -g window-status-style          "fg=#585b70"
setw -g window-status-format         " #I #W "
setw -g window-status-current-style  "fg=#f9e2af,bold"
setw -g window-status-current-format " #I #W "

# Window activity alert (e.g. long-running kubectl logs finishes)
setw -g monitor-activity on
set -g visual-activity off
setw -g window-status-activity-style "fg=#f38ba8"

# Pane borders
set -g pane-border-style        "fg=#313244"
set -g pane-active-border-style "fg=#f9e2af"

# ── TPM plugins ───────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'        # ← new: syncs 'y' to system clipboard

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Keep this at the very bottom
run '~/.tmux/plugins/tpm/tpm'
